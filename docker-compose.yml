services:
    postgres:
        image: postgres:18-alpine
        container_name: nexus-postgres
        restart: unless-stopped
        environment:
            POSTGRES_DB: discordbot
            POSTGRES_USER: discordbot
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-discordbot123}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - nexus-network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U discordbot -d discordbot"]
            interval: 30s
            timeout: 10s
            retries: 3
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

    redis:
        image: redis:8-alpine
        container_name: nexus-redis
        restart: unless-stopped
        command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
        volumes:
            - redis_data:/data
        networks:
            - nexus-network
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 30s
            timeout: 10s
            retries: 3
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

    bot:
        image: ${IMAGE_PREFIX:-ghcr.io/lucassantana-dev/nexus}-bot:${IMAGE_TAG:-latest}
        build:
            context: .
            dockerfile: Dockerfile
            target: production-bot
            args:
                SERVICE: bot
                NODE_ENV: production
        container_name: nexus-bot
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        environment:
            - NODE_ENV=production
            - DISCORD_TOKEN=${DISCORD_TOKEN}
            - CLIENT_ID=${CLIENT_ID}
            - DATABASE_URL=postgresql://discordbot:${POSTGRES_PASSWORD:-discordbot123}@postgres:5432/discordbot
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - REDIS_DB=${REDIS_DB:-0}
            - BOT_NAME=${BOT_NAME:-Nexus}
            - LASTFM_API_KEY=${LASTFM_API_KEY:-}
            - LASTFM_API_SECRET=${LASTFM_API_SECRET:-}
            - LASTFM_SESSION_KEY=${LASTFM_SESSION_KEY:-}
            - LASTFM_LINK_SECRET=${LASTFM_LINK_SECRET:-}
            - WEBAPP_REDIRECT_URI=${WEBAPP_REDIRECT_URI:-}
            - WEBAPP_SESSION_SECRET=${WEBAPP_SESSION_SECRET:-}
        volumes:
            - ./downloads:/app/downloads
            - ./logs:/app/logs
        networks:
            - nexus-network
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

    backend:
        image: ${IMAGE_PREFIX:-ghcr.io/lucassantana-dev/nexus}-backend:${IMAGE_TAG:-latest}
        build:
            context: .
            dockerfile: Dockerfile
            target: production-backend
            args:
                SERVICE: backend
                NODE_ENV: production
        container_name: nexus-backend
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        environment:
            - NODE_ENV=production
            - CLIENT_ID=${CLIENT_ID}
            - CLIENT_SECRET=${CLIENT_SECRET}
            - DATABASE_URL=postgresql://discordbot:${POSTGRES_PASSWORD:-discordbot123}@postgres:5432/discordbot
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - REDIS_DB=${REDIS_DB:-0}
            - WEBAPP_PORT=3000
            - WEBAPP_REDIRECT_URI=${WEBAPP_REDIRECT_URI}
            - WEBAPP_SESSION_SECRET=${WEBAPP_SESSION_SECRET}
            - DEVELOPER_USER_IDS=${DEVELOPER_USER_IDS:-}
            - LASTFM_API_KEY=${LASTFM_API_KEY:-}
            - LASTFM_API_SECRET=${LASTFM_API_SECRET:-}
            - LASTFM_LINK_SECRET=${LASTFM_LINK_SECRET:-}
            - WEBAPP_FRONTEND_URL=${WEBAPP_FRONTEND_URL:-}
        networks:
            - nexus-network
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

    frontend:
        image: ${IMAGE_PREFIX:-ghcr.io/lucassantana-dev/nexus}-frontend:${IMAGE_TAG:-latest}
        build:
            context: .
            dockerfile: Dockerfile.frontend
        container_name: nexus-frontend
        restart: unless-stopped
        networks:
            - nexus-network
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

    nginx:
        image: ${IMAGE_PREFIX:-ghcr.io/lucassantana-dev/nexus}-nginx:${IMAGE_TAG:-latest}
        build:
            context: .
            dockerfile: Dockerfile.nginx
        container_name: nexus-nginx
        restart: unless-stopped
        depends_on:
            - backend
            - frontend
            - webhook
        ports:
            - "${NGINX_PORT:-8080}:80"
        networks:
            - nexus-network
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

    webhook:
        build:
            context: ./deploy
            dockerfile: Dockerfile
        container_name: nexus-webhook
        restart: unless-stopped
        command: >
            -hooks /etc/webhook/hooks.json
            -verbose
            -hotreload
        environment:
            - DEPLOY_WEBHOOK_SECRET=${DEPLOY_WEBHOOK_SECRET}
            - DISCORD_DEPLOY_WEBHOOK=${DISCORD_DEPLOY_WEBHOOK:-}
            - DEPLOY_DIR=/repo
        volumes:
            - ./deploy/hooks.json:/etc/webhook/hooks.json:ro
            - ./scripts/deploy.sh:/scripts/deploy.sh:ro
            - .:/repo
            - /var/run/docker.sock:/var/run/docker.sock
        working_dir: /repo
        networks:
            - nexus-network
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

    # Cloudflare Tunnel — exposes nginx to nexus.lucassantana.tech
    cloudflared:
        image: cloudflare/cloudflared:latest
        container_name: nexus-tunnel
        restart: unless-stopped
        command: tunnel --config /etc/cloudflared/config-nexus.yml run
        user: root
        volumes:
            - ${HOME}/.cloudflared:/etc/cloudflared:ro
        depends_on:
            - nginx
        networks:
            - nexus-network
        profiles:
            - tunnel
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

volumes:
    postgres_data:
    redis_data:

networks:
    nexus-network:
        driver: bridge
