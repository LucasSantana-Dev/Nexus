name: Deploy Nexus

on:
    push:
        branches: [main]
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Check deploy secrets
              env:
                  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
                  SSH_USER: ${{ secrets.SSH_USER }}
                  SSH_HOST: ${{ secrets.SSH_HOST }}
              run: |
                  missing=""
                  [ -z "$SSH_PRIVATE_KEY" ] && missing="SSH_PRIVATE_KEY "
                  [ -z "$SSH_USER" ] && missing="${missing}SSH_USER "
                  [ -z "$SSH_HOST" ] && missing="${missing}SSH_HOST"
                  if [ -n "$missing" ]; then
                    echo "::error::Missing GitHub Actions secrets: $missing"
                    echo "Add them in repo Settings -> Secrets and variables -> Actions."
                    exit 1
                  fi

            - name: Setup SSH
              uses: webfactory/ssh-agent@v0.9.1
              with:
                  ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

            - name: Deploy to server
              env:
                  DEPLOY_USER: ${{ secrets.SSH_USER }}
                  DEPLOY_HOST: ${{ secrets.SSH_HOST }}
                  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
              run: |
                  DEPLOY_DIR="${DEPLOY_PATH:-/opt/nexus}"
                  ssh -o StrictHostKeyChecking=no "$DEPLOY_USER@$DEPLOY_HOST" bash -s -- "$DEPLOY_DIR" << 'EOF'
                    set -e
                    cd "$1"

                    echo "Pulling latest changes..."
                    git pull origin main

                    echo "Building new Docker image..."
                    docker build --target production-bot -t nexus:latest .

                    echo "Stopping current container..."
                    ./scripts/discord-bot.sh stop

                    echo "Starting container with new image..."
                    ./scripts/discord-bot.sh start

                    sleep 5
                    echo "Checking container status..."
                    ./scripts/discord-bot.sh status

                    echo "Deployment completed!"
                  EOF

            - name: Notify deployment status
              if: always()
              env:
                  JOB_STATUS: ${{ job.status }}
              run: |
                  if [ "$JOB_STATUS" = "success" ]; then
                    echo "Deployment successful"
                  else
                    echo "Deployment failed"
                  fi
