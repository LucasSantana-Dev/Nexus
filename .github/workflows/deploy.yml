name: Deploy to Homelab

on:
    workflow_run:
        workflows: ['CI/CD Pipeline']
        types: [completed]
        branches: [main]
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest
        if: >
            github.event_name == 'workflow_dispatch' ||
            github.event.workflow_run.conclusion == 'success'

        steps:
            - name: Validate secrets
              env:
                  WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
                  WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
              run: |
                  missing=""
                  [ -z "$WEBHOOK_SECRET" ] && missing="DEPLOY_WEBHOOK_SECRET "
                  [ -z "$WEBHOOK_URL" ] && missing="${missing}DEPLOY_WEBHOOK_URL"
                  if [ -n "$missing" ]; then
                    echo "::error::Missing secrets: $missing"
                    exit 1
                  fi

            - name: Trigger deploy webhook
              env:
                  WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
                  WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
              run: |
                  echo "==> Triggering deploy webhook..."
                  response=$(curl -s -w "\n%{http_code}" \
                    -X POST \
                    -H "X-Webhook-Secret: $WEBHOOK_SECRET" \
                    --max-time 300 \
                    "$WEBHOOK_URL")

                  http_code=$(echo "$response" | tail -1)
                  body=$(echo "$response" | sed '$d')

                  echo "Response: $body (HTTP $http_code)"

                  if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
                    echo "==> Deploy triggered successfully!"
                  else
                    echo "::error::Deploy webhook failed with HTTP $http_code"
                    exit 1
                  fi

            - name: Notify failure
              if: failure()
              run: echo "::error::Homelab deployment failed — check logs above"
