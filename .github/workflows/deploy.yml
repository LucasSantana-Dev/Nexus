name: Deploy to Homelab

on:
    workflow_run:
        workflows: ['CI/CD Pipeline']
        types: [completed]
        branches: [main]
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest
        if: >
            github.event_name == 'workflow_dispatch' ||
            github.event.workflow_run.conclusion == 'success'

        steps:
            - name: Validate secrets
              env:
                  WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
                  WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
              run: |
                  missing=""
                  [ -z "$WEBHOOK_SECRET" ] && missing="DEPLOY_WEBHOOK_SECRET "
                  [ -z "$WEBHOOK_URL" ] && missing="${missing}DEPLOY_WEBHOOK_URL"
                  if [ -n "$missing" ]; then
                    echo "::error::Missing secrets: $missing"
                    exit 1
                  fi

            - name: Trigger deploy webhook
              env:
                  WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
                  WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
              run: |
                  set -euo pipefail
                  echo "==> Triggering deploy webhook..."

                  call_webhook() {
                    local url="$1"
                    curl -s -w "\n%{http_code}" \
                      -X POST \
                      -H "X-Webhook-Secret: $WEBHOOK_SECRET" \
                      --connect-timeout 10 \
                      --max-time 20 \
                      "$url"
                  }

                  call_webhook_with_retry() {
                    local url="$1"
                    local attempt http body response max_attempts
                    max_attempts=8

                    for attempt in $(seq 1 "$max_attempts"); do
                      response=$(call_webhook "$url" || true)
                      http=$(echo "$response" | tail -1)
                      body=$(echo "$response" | sed '$d')

                      echo "Response from $url (attempt $attempt/$max_attempts): $body (HTTP $http)" >&2

                      if [ "$http" -ge 200 ] && [ "$http" -lt 300 ]; then
                        echo "$response"
                        return 0
                      fi

                      if [ "$attempt" -lt "$max_attempts" ] && { [ "$http" -ge 500 ] || [ "$http" = "000" ]; }; then
                        sleep $((attempt * 4))
                        continue
                      fi

                      echo "$response"
                      return 0
                    done
                  }

                  try_webhook_url() {
                    local url="$1"
                    local response http_code body
                    response=$(call_webhook_with_retry "$url")
                    http_code=$(echo "$response" | tail -1)
                    body=$(echo "$response" | sed '$d')
                    echo "$http_code"$'\n'"$body"
                  }

                  retry_url="${WEBHOOK_URL%/}/webhook/deploy"
                  selected_code=""
                  selected_body=""

                  result=$(try_webhook_url "$WEBHOOK_URL")
                  selected_code=$(echo "$result" | head -1)
                  selected_body=$(echo "$result" | sed '1d')

                  if [ "$selected_code" -ge 200 ] && [ "$selected_code" -lt 300 ]; then
                    echo "==> Deploy triggered successfully!"
                    exit 0
                  fi

                  if [ "$WEBHOOK_URL" != "$retry_url" ]; then
                    echo "==> Retrying against canonical webhook path: $retry_url" >&2
                    result=$(try_webhook_url "$retry_url")
                    selected_code=$(echo "$result" | head -1)
                    selected_body=$(echo "$result" | sed '1d')
                  fi

                  if [ "$selected_code" -ge 200 ] && [ "$selected_code" -lt 300 ]; then
                    echo "==> Deploy triggered successfully!"
                  else
                    echo "::error::Deploy webhook failed with HTTP $selected_code"
                    echo "::error::Response body: $selected_body"
                    exit 1
                  fi

            - name: Auth config smoke check
              env:
                  WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
              run: |
                  set -euo pipefail

                  base_url=$(node -e 'const u = new URL(process.env.WEBHOOK_URL); console.log(`${u.protocol}//${u.host}`)')
                  auth_health_url="${base_url}/api/health/auth-config"
                  generic_health_url="${base_url}/api/health"
                  health_url="$auth_health_url"

                  echo "==> Running deploy smoke check: $health_url"

                  for attempt in $(seq 1 18); do
                    echo "Attempt ${attempt}/18..."
                    response=$(curl -sS --max-time 20 -w "\n%{http_code}" "$health_url" || true)
                    http_code=$(echo "$response" | tail -1)
                    body=$(echo "$response" | sed '$d')

                    if [ "$http_code" = "404" ] && [ "$health_url" = "$auth_health_url" ]; then
                      echo "Auth-config health endpoint not available. Falling back to generic health check."
                      health_url="$generic_health_url"
                      continue
                    fi

                    if [ "$http_code" = "200" ]; then
                      if [ "$health_url" = "$generic_health_url" ]; then
                        echo "==> Generic health check passed"
                        exit 0
                      fi

                      HEALTH_BODY="$body" node -e '
                        const body = process.env.HEALTH_BODY ?? "";
                        let parsed;
                        try {
                          parsed = JSON.parse(body);
                        } catch {
                          console.error("::error::auth-config returned invalid JSON");
                          process.exit(1);
                        }

                        const status = parsed?.status ?? "unknown";
                        const hasLegacyDomain = Boolean(parsed?.auth?.hasLegacyDomain);
                        const warnings = Array.isArray(parsed?.warnings) ? parsed.warnings : [];

                        if (status !== "ok" || hasLegacyDomain || warnings.length > 0) {
                          console.error(
                            `::error::OAuth auth-config smoke check failed (status=${status}, hasLegacyDomain=${hasLegacyDomain}, warnings=${warnings.length})`,
                          );
                          if (warnings.length > 0) {
                            console.error(`::error::Warnings: ${warnings.join(" | ")}`);
                          }
                          process.exit(1);
                        }

                        console.log("==> OAuth auth-config smoke check passed");
                      '
                      exit 0
                    fi

                    echo "Service not ready yet at $health_url (HTTP $http_code). Waiting 10s..."
                    sleep 10
                  done

                  echo "::error::Timed out waiting for health endpoint to become available"
                  exit 1

            - name: Notify failure
              if: failure()
              run: echo "::error::Homelab deployment failed — check logs above"
