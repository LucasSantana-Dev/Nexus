name: Deploy to Homelab

on:
    workflow_run:
        workflows: ['CI/CD Pipeline']
        types: [completed]
        branches: [main]
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest
        if: >
            github.event_name == 'workflow_dispatch' ||
            github.event.workflow_run.conclusion == 'success'

        steps:
            - name: Validate secrets
              env:
                  SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
                  SSH_USER: ${{ secrets.SSH_USER }}
                  SSH_HOST: ${{ secrets.SSH_HOST }}
              run: |
                  missing=""
                  [ -z "$SSH_KEY" ] && missing="SSH_PRIVATE_KEY "
                  [ -z "$SSH_USER" ] && missing="${missing}SSH_USER "
                  [ -z "$SSH_HOST" ] && missing="${missing}SSH_HOST"
                  if [ -n "$missing" ]; then
                    echo "::error::Missing secrets: $missing"
                    exit 1
                  fi

            - name: Setup SSH
              uses: webfactory/ssh-agent@v0.9.1
              with:
                  ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

            - name: Deploy
              env:
                  DEPLOY_USER: ${{ secrets.SSH_USER }}
                  DEPLOY_HOST: ${{ secrets.SSH_HOST }}
                  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
              run: |
                  DEPLOY_DIR="${DEPLOY_PATH:-/home/luk-server/Nexus}"
                  ssh -o StrictHostKeyChecking=no "$DEPLOY_USER@$DEPLOY_HOST" bash -s -- "$DEPLOY_DIR" << 'REMOTE'
                    set -e
                    cd "$1"

                    echo "==> Pulling latest changes..."
                    git pull origin main

                    echo "==> Building images..."
                    docker compose build --parallel

                    echo "==> Rolling out services..."
                    docker compose up -d --remove-orphans

                    echo "==> Waiting for health checks..."
                    sleep 10

                    echo "==> Service status:"
                    docker compose ps --format "table {{.Name}}\t{{.Status}}\t{{.Ports}}"

                    unhealthy=$(docker compose ps --format json | grep -c '"unhealthy"' || true)
                    if [ "$unhealthy" -gt 0 ]; then
                      echo "::error::$unhealthy unhealthy container(s)"
                      docker compose logs --tail=20 --no-color
                      exit 1
                    fi

                    echo "==> Pruning old images..."
                    docker image prune -f --filter "until=24h"

                    echo "==> Deploy complete!"
                  REMOTE

            - name: Notify failure
              if: failure()
              run: echo "::error::Homelab deployment failed — check logs above"
