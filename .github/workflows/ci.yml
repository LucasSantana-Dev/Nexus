name: CI/CD Pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    quality-gates:
        name: Quality Gates
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Fix binary permissions
              run: chmod +x node_modules/.bin/* 2>/dev/null || true

            - name: Lint code
              run: npm run lint

            - name: Type check
              run: npm run type:check

            - name: Build project
              run: npm run build

            - name: Run tests
              run: npm run test:ci

            - name: Check test coverage
              run: npm run test:coverage

            - name: Upload coverage reports
              uses: codecov/codecov-action@v5
              with:
                  files: packages/backend/coverage/lcov.info
                  flags: backend
                  name: codecov-backend
                  fail_ci_if_error: false

    security:
        name: Security
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Security audit
              run: npm audit --audit-level critical
              continue-on-error: true

            - name: Secrets scan
              run: npx secretlint "**/*"

            - name: TruffleHog secret scan
              uses: trufflesecurity/trufflehog@main
              with:
                  extra_args: --only-verified
              continue-on-error: true
